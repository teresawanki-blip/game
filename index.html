<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面試法寶大檢查 v2.1</title>
    <style>
        :root {
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f0f7fa;
        }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            text-align: center; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-box { 
            background: white; 
            border-radius: 40px; 
            padding: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 85%; 
            max-width: 650px;
        }
        h1 { color: #2c3e50; font-size: 2.2rem; margin-bottom: 10px; }
        #display-area { 
            background: #fdfdfd;
            border: 6px solid #eef2f3;
            border-radius: 30px;
            margin: 20px 0;
            padding: 30px;
            min-height: 250px;
        }
        #item-icon { font-size: 140px; display: block; margin-bottom: 10px; }
        #item-name { font-size: 50px; font-weight: bold; color: #2c3e50; }
        .controls { display: flex; justify-content: center; gap: 30px; }
        .btn { 
            flex: 1;
            font-size: 45px; 
            padding: 25px 0; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold;
            transition: all 0.1s;
            box-shadow: 0 8px rgba(0,0,0,0.1);
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px rgba(0,0,0,0.1); }
        #yes-btn { background-color: var(--success-color); }
        #no-btn { background-color: var(--error-color); }
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 250px;
            background: rgba(255,255,255,0.9);
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-box">
    <h1>見工法寶檢查</h1>
    <div id="display-area">
        <span id="item-icon">❓</span>
        <div id="item-name">準備...</div>
    </div>
    <div class="controls">
        <button id="yes-btn" class="btn" onclick="handleAnswer(true)">要 ✅</button>
        <button id="no-btn" class="btn" onclick="handleAnswer(false)">不要 ❌</button>
    </div>
</div>

<div id="overlay"></div>

<script>
    const items = [
        { name: "身份證", icon: "🪪", want: true },
        { name: "學歷證明", icon: "📜", want: true },
        { name: "大頭相片", icon: "👤", want: true },
        { name: "受僱證明", icon: "📄", want: true },
        { name: "工作證明", icon: "🏢", want: true },
        { name: "玩具車", icon: "🚗", want: false },
        { name: "巧克力", icon: "🍫", want: false },
        { name: "遊戲機", icon: "🎮", want: false },
        { name: "梳子", icon: "🪮", want: false },
        { name: "水瓶", icon: "🍼", want: false },
        { name: "枕頭", icon: "🛌", want: false },
        { name: "雨傘", icon: "🌂", want: false },
        { name: "牙刷", icon: "🪥", want: false },
        { name: "足球", icon: "⚽", want: false },
        { name: "睡衣", icon: "👕", want: false },
        { name: "漢堡包", icon: "🍔", want: false },
        { name: "遙控器", icon: "📺", want: false },
        { name: "垃圾桶", icon: "🗑️", want: false },
        { name: "衣架", icon: "🧥", want: false },
        { name: "剪刀", icon: "✂️", want: false }
    ];

    let currentItem = null;
    let lastItemName = "";
    let lastAnswer = null;
    let answerRepeatCount = 0;

    function nextQuestion() {
        document.getElementById('overlay').style.display = 'none';

        // 1. 先排除「上一題」出現過的項目名稱
        let pool = items.filter(item => item.name !== lastItemName);

        // 2. 如果同一個答案（要/不要）已經連續出現 2 次，強制換另一種答案
        if (answerRepeatCount >= 2) {
            pool = pool.filter(item => item.want !== lastAnswer);
        }

        // 隨機抽取
        const randomIndex = Math.floor(Math.random() * pool.length);
        currentItem = pool[randomIndex];

        // 3. 更新狀態追蹤
        if (currentItem.want === lastAnswer) {
            answerRepeatCount++;
        } else {
            answerRepeatCount = 1;
        }
        
        lastItemName = currentItem.name;
        lastAnswer = currentItem.want;

        // 更新畫面
        document.getElementById('item-icon').innerText = currentItem.icon;
        document.getElementById('item-name').innerText = currentItem.name;
    }

    function handleAnswer(userChoice) {
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'flex';
        
        if (userChoice === currentItem.want) {
            overlay.innerText = "✅";
            overlay.style.color = "#2ecc71";
        } else {
            overlay.innerText = "❌";
            overlay.style.color = "#e74c3c";
        }

        setTimeout(nextQuestion, 1200);
    }

    window.onload = nextQuestion;
</script>
</body>
</html>
