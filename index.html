<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面試法寶大檢查 - 計分版</title>
    <style>
        :root {
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f0f7fa;
            --primary-color: #3498db;
        }
        body { 
            font-family: "Microsoft JhengHei", sans-serif; 
            text-align: center; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-box { 
            background: white; 
            border-radius: 40px; 
            padding: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 85%; 
            max-width: 650px;
            position: relative;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        h1 { color: #2c3e50; font-size: 2rem; margin: 0; }
        
        #display-area { 
            background: #fdfdfd;
            border: 6px solid #eef2f3;
            border-radius: 30px;
            margin: 15px 0;
            padding: 20px;
            min-height: 220px;
        }
        #item-icon { font-size: 130px; display: block; margin-bottom: 5px; }
        #item-name { font-size: 45px; font-weight: bold; color: #2c3e50; }

        .controls { display: flex; justify-content: center; gap: 25px; }
        .btn { 
            flex: 1;
            font-size: 40px; 
            padding: 20px 0; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold;
            transition: all 0.1s;
            box-shadow: 0 8px rgba(0,0,0,0.1);
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px rgba(0,0,0,0.1); }
        #yes-btn { background-color: var(--success-color); }
        #no-btn { background-color: var(--error-color); }

        /* 結算畫面 */
        #result-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #result-score { font-size: 80px; color: var(--primary-color); margin: 20px 0; }
        .restart-btn {
            background-color: var(--primary-color);
            font-size: 30px;
            padding: 15px 40px;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 250px;
            background: rgba(255,255,255,0.9);
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-box">
    <div id="quiz-screen">
        <div class="stats">
            <div id="progress">第 1 / 10 題</div>
            <div id="score-display">
