<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面試準備大考驗 v2</title>
    <style>
        :root {
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --bg-color: #f7f9fc;
        }
        body { 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            text-align: center; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            user-select: none;
        }
        #game-box { 
            background: white; 
            border-radius: 40px; 
            padding: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 85%; 
            max-width: 650px;
        }
        h1 { color: #2c3e50; font-size: 2.2rem; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 1.2rem; margin-top: 0; }
        
        #display-area { 
            background: #fdfdfd;
            border: 6px solid #f1f2f6;
            border-radius: 30px;
            margin: 20px 0;
            padding: 30px;
        }
        #item-icon { font-size: 140px; display: block; margin-bottom: 10px; }
        #item-name { font-size: 50px; font-weight: bold; color: #2c3e50; }

        .controls { display: flex; justify-content: center; gap: 30px; }
        .btn { 
            flex: 1;
            font-size: 45px; 
            padding: 25px 0; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            color: white; 
            font-weight: bold;
            transition: all 0.1s;
            box-shadow: 0 8px #00000022;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px #00000022; }
        
        #yes-btn { background-color: var(--success-color); }
        #no-btn { background-color: var(--error-color); }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 250px;
            background: rgba(255,255,255,0.9);
            z-index: 100;
        }
    </style>
</head>
<body>

<div id="game-box">
    <h1>見工法寶檢查</h1>
    <p>這是面試前要準備的文件嗎？</p>
    
    <div id="display-area">
        <span id="item-icon">❓</span>
        <div id="item-name">載入中</div>
    </div>

    <div class="controls">
        <button id="yes-btn" class="btn" onclick="check(true)">要 ✅</button>
        <button id="no-btn" class="btn" onclick="check(false)">不要 ❌</button>
    </div>
</div>

<div id="overlay"></div>

<script>
    // 題目資料庫 (共 20 個項目)
    const items = [
        // 核心文件 (要帶)
        { name: "身份證", icon: "🪪", want: true },
        { name: "學歷證明", icon: "📜", want: true },
        { name: "大頭相片", icon: "👤", want: true },
        { name: "受僱證明", icon: "📄", want: true },
        // 核心文件變體/補充
        { name: "工作證明", icon: "🏢", want: true },
        // 錯誤項目 (不要帶)
        { name: "玩具車", icon: "🚗", want: false },
        { name: "巧克力", icon: "🍫", want: false },
        { name: "遊戲機", icon: "🎮", want: false },
        { name: "梳子", icon: "🪮", want: false },
        { name: "水瓶", icon: "🍼", want: false },
        { name: "枕頭", icon: "🛌", want: false },
        { name: "雨傘", icon: "🌂", want: false },
        { name: "牙刷", icon: "🪥", want: false },
        { name: "足球", icon: "⚽", want: false },
        { name: "睡衣", icon: "👕", want: false },
        { name: "漢堡包", icon: "🍔", want: false },
        { name: "遙控器", icon: "📺", want: false },
        { name: "垃圾桶", icon: "🗑️", want: false },
        { name: "衣架", icon: "🧥", want: false },
        { name: "剪刀", icon: "✂️", want: false }
    ];

    let currentItem = {};
    let lastItem = null;
    let lastAnswer = null;
    let consecutiveCount = 0;

    function next() {
        document.getElementById('overlay').style.display = 'none';
        
        let pool = items.filter(item => item !== lastItem); // 確保不連續出現同一個項目

        // 防止同一個答案 (要/不要) 超過連續兩次
        if (consecutiveCount >= 2) {
            pool = pool.filter(item => item.want !== lastAnswer);
        }

        const randomIndex = Math.floor(Math.random() * pool.length);
        currentItem = pool[randomIndex];

        // 更新計數器
        if (currentItem.want === lastAnswer) {
            consecutiveCount++;
        } else {
            consecutiveCount = 1;
        }

        lastItem = currentItem;
        lastAnswer = currentItem.want;

        document.getElementById('item-icon').innerText = currentItem.icon;
        document.getElementById('item-name').innerText = currentItem.name;
    }

    function check(userSay) {
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'flex';
        
        if (userSay === currentItem.want) {
            overlay.innerText = "✅";
            overlay.style.color = "#2ecc71";
        } else {
            overlay.innerText = "❌";
            overlay.style.color = "#e74c3c";
        }

        setTimeout(next, 1200); // 1.2秒後換題，節奏更快一點
    }

    window.onload = next;
</script>

</body>
</html>
